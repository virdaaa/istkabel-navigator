        function getRoute(entranceId, placeId) {
            const routes = {
                'kozh-34zh': { 'svalka': ROUTE_KOZH_SVALKA, '10203': ROUTE_KOZH_10203, 'nado-podumat': ROUTE_KOZH_NADO, 'skellige': ROUTE_KOZH_SKELLIGE, 'wodovorot': ROUTE_KOZH_WODOVOROT, 'balkan': ROUTE_KOZH_BALKAN, 'mongolfieri': ROUTE_KOZH_MONGOLFIERI, 'nividimy': ROUTE_KOZH_NIVIDIMY, 'holdtoold': ROUTE_KOZH_HOLDTOOLD },
                'dom-byta': { 'svalka': ROUTE_DOMBYTA_SVALKA, '10203': ROUTE_DOMBYTA_10203, 'nado-podumat': ROUTE_DOMBYTA_NADO, 'skellige': ROUTE_DOMBYTA_SKELLIGE, 'wodovorot': ROUTE_DOMBYTA_WODOVOROT, 'balkan': ROUTE_DOMBYTA_BALKAN, 'mongolfieri': ROUTE_DOMBYTA_MONGOLFIERI, 'nividimy': ROUTE_DOMBYTA_NIVIDIMY, 'holdtoold': ROUTE_DOMBYTA_HOLDTOOLD },
                'sevcable': { 'svalka': ROUTE_SEVCABLE_SVALKA, '10203': ROUTE_SEVCABLE_10203, 'nado-podumat': ROUTE_SEVCABLE_NADO, 'skellige': ROUTE_SEVCABLE_SKELLIGE, 'wodovorot': ROUTE_SEVCABLE_WODOVOROT, 'balkan': ROUTE_SEVCABLE_BALKAN, 'mongolfieri': ROUTE_SEVCABLE_MONGOLFIERI, 'nividimy': ROUTE_SEVCABLE_NIVIDIMY, 'holdtoold': ROUTE_SEVCABLE_HOLDTOOLD }
            };
            return routes[entranceId]?.[placeId] || null;
        }

        let state = { screen: 'places', entrance: null, place: null, step: 1, searchQuery: '' };
        const directionIcons = { forward: '➡️', left: '⬅️', right: '➡️', up: '⬆️', down: '⬇️', arrived: '📍' };

        function generatePlacesListHTML() {
            const filteredPlaces = PLACES.filter(p => p.name.toLowerCase().includes(state.searchQuery.toLowerCase()) || p.category.toLowerCase().includes(state.searchQuery.toLowerCase()));
            return [1, 2, 3].map(floor => {
                const placesOnFloor = filteredPlaces.filter(p => p.floor === floor).sort((a, b) => (b.recommended ? 1 : 0) - (a.recommended ? 1 : 0));
                if (placesOnFloor.length === 0) return '';
                return '<div><div class="text-xs text-gray-500 mb-2">' + floor + ' ЭТАЖ</div><div class="space-y-2">' + placesOnFloor.map(p => '<div class="place-card w-full p-4 rounded-xl cursor-pointer' + (p.recommended ? ' place-recommended' : '') + '" data-place="' + p.id + '" style="display: flex; align-items: center; justify-content: space-between;' + (p.recommended ? '' : ' background: #1f2937;') + '"><div class="place-info" style="display: flex; align-items: center; gap: 12px; flex: 1;"><span class="text-2xl">' + p.icon + '</span><div><div class="font-bold" style="color: #fff;">' + p.name + (p.recommended ? '<span class="recommend-badge">⭐</span>' : '') + '</div><div class="text-sm" style="color: #9ca3af;">' + p.category + '</div></div></div><div class="place-buttons">' + (p.website ? '<a href="' + p.website + '" target="_blank" rel="noopener noreferrer" class="btn-site-small" data-place-id="' + p.id + '" onclick="event.stopPropagation();">Сайт</a>' : '') + '<span class="btn-route-small">→</span></div></div>').join('') + '</div></div>';
            }).join('');
        }

        function updatePlacesList() {
            const container = document.getElementById('places-list');
            if (container) {
                container.innerHTML = generatePlacesListHTML();
                attachPlaceCardEvents();
            }
        }

        function attachPlaceCardEvents() {
            document.querySelectorAll('.place-card').forEach(card => {
                card.onclick = (e) => {
                    if (e.target.closest('.btn-site-small')) return;
                    const placeId = card.dataset.place;
                    const place = PLACES.find(p => p.id === placeId);
                    if (typeof ym !== 'undefined') ym(106347458, 'reachGoal', 'click_place', {place_id: placeId, place_name: place.name});
                    state.place = place;
                    state.screen = 'map';
                    render();
                };
            });
            document.querySelectorAll('.btn-site-small').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const placeId = btn.dataset.placeId;
                    const place = PLACES.find(p => p.id === placeId);
                    if (typeof ym !== 'undefined') ym(106347458, 'reachGoal', 'click_website', {place_id: placeId, place_name: place.name});
                };
            });
        }

        function render() {
            const app = document.getElementById('app');
            if (state.screen === 'places') app.innerHTML = renderPlacesScreen();
            else if (state.screen === 'map') app.innerHTML = renderMapScreen();
            else if (state.screen === 'route') app.innerHTML = renderRouteScreen();
            attachEvents();
        }

        function renderPlacesScreen() {
            return '<div class="min-h-screen flex flex-col" style="background: #0a0a0a;"><header class="p-4 border-b flex items-center gap-3" style="background: #111827; border-color: #1f2937;"><span class="text-2xl">📍</span><span class="font-bold" style="color: #ffffff;">Исткабель — куда идём?</span></header><main class="flex-1 p-4"><div class="mb-4"><input type="text" id="search-input" placeholder="🔍 Найти..." value="' + state.searchQuery + '" class="w-full p-3 rounded-xl border-0 outline-none" style="background: #374151; color: #fff; font-weight: 500;" /></div><div id="places-list" class="space-y-4">' + generatePlacesListHTML() + '</div></main></div>';
        }

        function renderMapScreen() {
            return '<div class="min-h-screen flex flex-col" style="background: #0a0a0a;"><header class="p-4 border-b flex items-center gap-3" style="background: #111827; border-color: #1f2937;"><button class="back-to-places text-xl" style="color: #9ca3af;">←</button><span class="text-2xl">' + (state.place?.icon || '📍') + '</span><span class="font-bold" style="color: #ffffff;">Идём в ' + (state.place?.name || '') + '</span></header><main class="flex-1 p-4"><h2 class="text-xl font-bold text-center mb-4" style="color: #ffffff;">Откуда вы заходите?</h2><div class="relative rounded-xl overflow-hidden border border-gray-700 mb-4" style="background: #111827;"><img src="https://virdaaa.github.io/istkabel-navigator/map.webp" alt="Карта Исткабель" class="w-full h-auto" style="display: block;" /><div class="absolute text-center" style="left: 50%; top: 18%; transform: translateX(-50%); color: #374151; font-size: 5vw; font-weight: 500;">Барная линия</div>' + ENTRANCES.map(e => '<button class="entrance-marker absolute transform -translate-x-1/2 -translate-y-1/2 transition-transform hover-scale" data-entrance="' + e.id + '" style="left: ' + e.x + '%; top: ' + e.y + '%"><div class="w-10 h-10 rounded-full border-2 border-white flex items-center justify-center text-lg shadow-lg" style="background: ' + e.color + '">🚪</div></button>').join('') + '</div><div class="space-y-2">' + ENTRANCES.map(e => { const time = getRouteTime(e.id, state.place?.id); const timeStr = formatTime(time); return '<button class="entrance-btn w-full p-4 rounded-xl text-left font-bold transition-transform flex justify-between items-center" data-entrance="' + e.id + '" style="background: ' + e.color + '; color: #ffffff;"><span>' + e.name + '</span>' + (timeStr ? '<span class="text-sm opacity-80">' + timeStr + '</span>' : '') + '</button>'; }).join('') + '</div></main></div>';
        }

        function renderRouteScreen() {
            const route = getRoute(state.entrance.id, state.place.id);
            if (!route) return '<div class="min-h-screen flex flex-col items-center justify-center p-4" style="background: #0a0a0a;"><div class="text-6xl mb-4">🚧</div><div class="text-xl font-bold text-white mb-2">Маршрут в разработке</div><button class="back-btn px-6 py-3 rounded-xl bg-gray-700 text-white">← Назад</button></div>';
            const currentStep = route[state.step - 1];
            const isFirst = state.step === 1;
            const isLast = state.step === route.length;
            const time = getRouteTime(state.entrance.id, state.place.id);
            const timeStr = formatTime(time);
            return '<div class="min-h-screen flex flex-col"><header class="p-4 border-b border-gray-800 flex items-center justify-between"><div class="flex items-center gap-3"><button class="back-btn text-gray-400 text-xl">←</button><span class="text-2xl">🧶</span></div><div class="text-sm text-gray-400">' + state.entrance.name + ' → ' + state.place.name + (timeStr ? ' <span class="ml-2 text-orange-400">' + timeStr + '</span>' : '') + '</div><button class="home-btn text-xl">🏠</button></header><div class="h-1 bg-gray-800"><div class="h-full btn-primary transition-all duration-300" style="width: ' + (state.step / route.length) * 100 + '%"></div></div><main class="flex-1 flex flex-col overflow-hidden"><div class="relative route-photo" style="flex: 1 1 auto; min-height: 180px; max-height: 50vh;"><div class="photo-loader absolute inset-0 flex items-center justify-center"><div class="loader animate-spin"></div></div><img src="' + currentStep.photo + '" alt="' + currentStep.text + '" class="absolute inset-0 w-full h-full object-cover" crossorigin="anonymous" onload="this.style.opacity=1; this.parentElement.querySelector(\'.photo-loader\').style.display=\'none\';" onerror="this.parentElement.querySelector(\'.photo-loader\').innerHTML=\'<div class=\\\'text-center\\\'><div class=\\\'text-4xl mb-2\\\'>📷</div><div class=\\\'text-gray-400 text-sm\\\'>Фото загружается...</div></div>\';" style="opacity: 0; transition: opacity 0.3s" /><div class="absolute top-2 left-2 bg-black-60 backdrop-blur rounded-full px-2 py-1 text-sm"><span class="text-orange-400 font-bold">' + state.step + '</span><span class="text-gray-400">/' + route.length + '</span></div><div class="absolute top-2 right-2 bg-black-60 backdrop-blur rounded-full w-8 h-8 flex items-center justify-center text-lg">' + directionIcons[currentStep.direction] + '</div>' + (isLast ? '<div class="absolute inset-0 bg-black-50 flex items-center justify-center"><div class="text-center animate-bounce"><div class="text-5xl">🧶</div><div class="text-xl font-bold mt-2">Добро пожаловать!</div></div></div>' : '') + '</div><div class="p-3 bg-gray-900 border-t border-gray-800" style="flex-shrink: 0;"><div class="flex items-start gap-2 mb-3 bg-gray-800 rounded-xl p-2"><div class="text-2xl">' + directionIcons[currentStep.direction] + '</div><div><div class="font-bold text-white">' + currentStep.text + '</div><div class="text-gray-300 text-sm">' + currentStep.hint + '</div></div></div><div class="flex gap-3"><button class="prev-btn flex-1 py-4 rounded-xl bg-gray-700 font-medium text-lg ' + (isFirst ? 'opacity-30' : '') + '" style="color: #fff;" ' + (isFirst ? 'disabled' : '') + '>← Назад</button><button class="next-btn flex-1 py-4 rounded-xl btn-primary font-bold text-lg" style="' + (isLast ? 'background: #16a34a;' : '') + '">' + (isLast ? '🏠 На главную' : 'Дальше →') + '</button></div></div></main></div>';
        }

        function attachEvents() {
            const searchInput = document.getElementById('search-input');
            if (searchInput) searchInput.oninput = (e) => { state.searchQuery = e.target.value; updatePlacesList(); };
            attachPlaceCardEvents();
            document.querySelectorAll('[data-entrance]').forEach(btn => { btn.onclick = () => { const entranceId = btn.dataset.entrance; if (typeof ym !== 'undefined') { ym(106347458, 'reachGoal', 'click_entrance', {entrance_id: entranceId, place_id: state.place?.id}); } state.entrance = ENTRANCES.find(e => e.id === entranceId); state.step = 1; state.screen = 'route'; render(); }; });
            document.querySelectorAll('.back-to-places').forEach(btn => { btn.onclick = () => { state.screen = 'places'; state.place = null; render(); }; });
            document.querySelectorAll('.back-btn').forEach(btn => { btn.onclick = () => { if (state.screen === 'route') { state.screen = 'map'; state.entrance = null; state.step = 1; } render(); }; });
            document.querySelectorAll('.home-btn').forEach(btn => { btn.onclick = () => { state.screen = 'places'; state.entrance = null; state.place = null; state.step = 1; state.searchQuery = ''; render(); }; });
            const prevBtn = document.querySelector('.prev-btn');
            const nextBtn = document.querySelector('.next-btn');
            if (prevBtn) prevBtn.onclick = () => { if (state.step > 1) { state.step--; render(); } };
            if (nextBtn) nextBtn.onclick = () => { const route = getRoute(state.entrance.id, state.place.id); if (route && state.step < route.length) { if (typeof ym !== 'undefined') ym(106347458, 'reachGoal', 'route_step', {step: state.step, place_id: state.place.id}); state.step++; const currentStep = route[state.step - 1]; if (currentStep.isFinal && typeof ym !== 'undefined') { ym(106347458, 'reachGoal', 'route_complete', {entrance_id: state.entrance.id, place_id: state.place.id, place_name: state.place.name}); } render(); } else if (route && state.step === route.length) { state.screen = 'places'; state.entrance = null; state.place = null; state.step = 1; state.searchQuery = ''; render(); } };
        }
        render();
